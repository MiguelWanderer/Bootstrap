<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M/WANDERER_OS - ENLACE_VOX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="efecto-crt">
    
    <nav class="navbar barra-neon mb-5">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 titulo-neon">M/WANDERER_OS_V1.0<span class="cursor-parpadeante">_</span></span>
            <div class="d-flex">
                <a href="index.html" class="texto-terminal pe-3 text-decoration-none hover-brillo">< VOLVER AL INICIO</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4 mb-5">
        <h1 class="titulo-neon text-center mb-2">PROTOCOLO DE RECLUTAMIENTO</h1>
        <h2 class="texto-terminal text-center mb-5">> Estableciendo canal VOX seguro...</h2>
        
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="caja-terminal p-4 p-md-5">
                    
                    <form action="#" method="POST">
                        <div class="mb-4">
                            <label for="aliasJugador" class="form-label texto-terminal">> IDENTIFICADOR (Alias):</label>
                            <input type="text" class="form-control input-neon" id="aliasJugador" placeholder="Ej: Operativo_S8" required>
                        </div>

                        <div class="mb-4">
                            <label for="sistemaInteres" class="form-label texto-terminal">> SISTEMA DE SIMULACIÓN REQUERIDO:</label>
                            <select class="form-select input-neon" id="sistemaInteres" required>
                                <option value="" selected disabled>Selecciona un archivo de destino...</option>
                                <option value="im">Imperium Maledictum (Sci-Fi Oscura)</option>
                                <option value="v5">Vampiro 5e (Horror Personal)</option>
                                <option value="dnd">D&D 2024 (Fantasía Táctica)</option>
                                <option value="soulbound">Soulbound (Fantasía Épica/Violenta)</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label texto-terminal">> NIVEL DE AUTORIZACIÓN (Experiencia previa):</label>
                            <div class="d-flex gap-4">
                                <div class="form-check">
                                    <input class="form-check-input check-neon" type="radio" name="experiencia" id="expAlta" value="alta" checked>
                                    <label class="form-check-label texto-terminal" for="expAlta">Veterano</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input check-neon" type="radio" name="experiencia" id="expBaja" value="baja">
                                    <label class="form-check-label texto-terminal" for="expBaja">Recluta / Novato</label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label for="mensajeVox" class="form-label texto-terminal">> TRANSMISIÓN DE DATOS (Por qué quieres unirte a la mesa):</label>
                            <textarea class="form-control input-neon" id="mensajeVox" rows="4" placeholder="Escribe tu mensaje aquí..." required></textarea>
                        </div>

                        <div class="text-center border-top border-warning pt-4 mt-4">
                            <button type="submit" class="btn boton-neon w-100">> TRANSMITIR_SEÑAL</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div> 

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
